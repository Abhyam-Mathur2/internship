services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: payroll_auditor
      MYSQL_USER: payroll
      MYSQL_PASSWORD: payroll
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:a1Gc+XsP9UB4txIiK30evx3BRlE+IWQtVuDHNxBlOYI=
      JWT_SECRET: docker-development-jwt-secret-change-me
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OCR_DRIVER: tesseract
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: payroll_auditor
      DB_USERNAME: payroll
      DB_PASSWORD: payroll
    command: sh /var/www/html/docker/start.sh

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host=0.0.0.0"

volumes:
  mysql_data:
